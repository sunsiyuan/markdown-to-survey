runtime: "typescript"
startCommand:
  type: "stdio"
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "Your HumanSurvey API key (starts with hs_sk_). Get one at https://www.humansurvey.co"
    required:
      - apiKey
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "humansurvey-mcp"],
      env: { HUMANSURVEY_API_KEY: config.apiKey }
    })
